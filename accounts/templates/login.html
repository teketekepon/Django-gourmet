{% extends 'base.html' %}

{% block title %}サインイン{% endblock %}

{% block contents %}
  <section class="auth-wrap">
    <div class="card auth-card section-stack">
      <h1 class="page-title">サインイン</h1>
      <p class="meta-text">登録済みアカウントでログインします。</p>

      {% if form.errors %}
        <p class="error-text">ユーザー名とパスワードが一致しません。</p>
      {% endif %}

      <form method="post" class="form-grid">
        {% csrf_token %}

        <div class="field-wrap">
          <label for="id_username">ユーザー名</label>
          <input
            type="text"
            name="username"
            id="id_username"
            maxlength="150"
            autocapitalize="none"
            autocomplete="username"
            placeholder="ユーザー名"
            required
            autofocus
          >
        </div>

        <div class="field-wrap">
          <label for="id_password">パスワード</label>
          <input
            type="password"
            name="password"
            id="id_password"
            autocomplete="current-password"
            placeholder="パスワード"
            required
          >
        </div>

        <input type="hidden" name="next" value="{% url 'dish:index' %}">

        <div class="actions-row">
          <button type="submit" class="btn btn-primary">ログイン</button>
          <a href="{% url 'accounts:signup' %}" class="btn btn-outline">サインアップへ</a>
        </div>
      </form>
    </div>
  </section>
{% endblock %}
